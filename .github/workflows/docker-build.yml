name: Build ARM Image
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Xray Binary
        run: |
          # Скачиваем абсолютно все файлы из релиза v1.8.4
          gh release download v1.8.4 -R XTLS/Xray-core
          
          # Ищем архив, в названии которого есть arm32-v7 (для hAP ac2)
          ARCHIVE=$(ls | grep -i "arm32-v7" | grep ".zip" | head -n 1)
          echo "Found archive: $ARCHIVE"
          
          # Распаковываем только сам бинарник xray в корень
          unzip -j "$ARCHIVE" xray -d .
          chmod +x xray
          ls -la xray
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/arm/v7
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mk_tg_bot:latest
