name: Build ARM Image
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

- name: Download Xray Binary
        run: |
          gh release download v1.8.4 -R XTLS/Xray-core
          # Ищем любой zip с arm32-v7
          ARCHIVE=$(ls | grep -i "arm32-v7" | grep ".zip" | head -n 1)
          echo "Found archive: $ARCHIVE"
          
          # Распаковываем ВЕСЬ архив во временную папку
          mkdir -p xray_temp
          unzip "$ARCHIVE" -d xray_temp
          
          # Ищем файл xray (игнорируя регистр) и переносим в корень
          find xray_temp -iname "xray" -type f -exec mv {} ./xray \;
          
          chmod +x xray
          ls -la xray
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/arm/v7
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mk_tg_bot:latest
