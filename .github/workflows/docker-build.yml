name: Build ARM Image
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

- name: Download Xray Binary
        run: |
          # Скачиваем архив для linux-arm32-v7 (подходит для hAP ac2)
          gh release download v1.8.4 -R XTLS/Xray-core -p "Xray-linux-arm32-v7.zip"
          
          # Распаковываем всё во временную папку
          mkdir -p temp_xray
          unzip Xray-linux-arm32-v7.zip -d temp_xray
          
          # Ищем бинарник (он может быть в корне или в папке) и копируем в текущую директорию
          find temp_xray -name "xray" -type f -exec cp {} . \;
          
          # Делаем исполняемым и проверяем наличие
          chmod +x xray
          ls -la xray
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/arm/v7
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mk_tg_bot:latest
